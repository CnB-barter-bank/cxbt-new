version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Sofia"
    open-pull-requests-limit: 10
    reviewers:
      - "bgrusnak"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    ignore:
      # Ignore updates for these dependencies
      - dependency-name: "eslint"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "prettier"
        update-types: ["version-update:semver-patch"]
    # Allow separate PRs for dev dependencies
    separate-patch-releases: true
    # Allow security updates
    groups:
      production-dependencies:
        patterns:
          - "@quasar/*"
          - "vue*"
          - "pinia"
          - "axios"
          - "ethers"
          - "wagmi"
      dev-dependencies:
        patterns:
          - "@vitest/*"
          - "@typescript-eslint/*"
          - "eslint*"
          - "prettier*"
          - "vitest"
          - "vite"
      web3-dependencies:
        patterns:
          - "@walletconnect/*"
          - "@web3modal/*"
          - "ethers"
          - "wagmi"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Sofia"
    open-pull-requests-limit: 5
    reviewers:
      - "bgrusnak"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "actions/*"
          - "github/*"
